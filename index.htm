<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日期待辦排序器 - 雲端版</title>
    <style>
        body { background: #0f1117; color: #e8eaed; font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .btn-sync { background: #63d297; color: #0f1117; border: none; padding: 12px 24px; rounded: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; border-radius: 8px; }
        .task-card { background: #181a22; border: 1px solid #2a2d37; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .date-label { color: #63d297; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .task-text { font-size: 14px; }
        #status { text-align: center; color: #7a7f8a; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>日期待辦排序器</h1>
        <div id="todayDisplay">載入中...</div>
    </div>

    <button class="btn-sync" onclick="syncData()">🔄 同步雲端資料</button>
    <div id="status">點擊按鈕從 GitHub 抓取資料</div>

    <hr style="border: 0; border-top: 1px solid #2a2d37; margin: 25px 0;">

    <div id="results">
        <!-- 資料會顯示在這裡 -->
    </div>

    <script>
        // 1. 顯示今日日期
        const today = new Date();
        document.getElementById('todayDisplay').textContent = "今日：" + (today.getFullYear() - 1911) + "年" + (today.getMonth() + 1) + "月" + today.getDate() + "日";

      async function syncData() {
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    
    status.textContent = "⌛ 正在連線至雲端 (使用代理伺服器)...";
    
    // 1. Your RAW Gist URL
    const gistUrl = 'https://gist.githubusercontent.com/kulo2026/6eb3376bcf2fe8f601ab1e59ffd42074/raw/4f3744f0987add6040fb53c4c288d3e62f2f9a5e/todo.json
';
    
    // 2. Wrap it in a Proxy to prevent "Network Failed" errors on GitHub Pages
    const proxiedUrl = `https://allorigins.win{encodeURIComponent(gistUrl)}&callback=?&t=${Date.now()}`;

    try {
        const response = await fetch(proxiedUrl);
        if (!response.ok) throw new Error("代理伺服器連線失敗");
        
        const json = await response.json();
        // AllOrigins returns the data inside a 'contents' string
        const data = JSON.parse(json.contents);
        
        if (data && data.items) {
            // Sort by date
            data.items.sort((a, b) => a.date.localeCompare(b.date));
            
            let html = '';
            data.items.forEach(item => {
                html += `
                    <div class="task-card">
                        <div class="date-label">${item.date}</div>
                        <div class="task-text">${item.task}</div>
                    </div>
                `;
            });
            
            results.innerHTML = html;
            status.textContent = "✅ 同步成功！";
        } else {
            status.textContent = "❌ 資料格式不符";
        }
    } catch (err) {
        console.error("Sync Error:", err);
        status.textContent = "❌ 同步失敗：請確認 Gist 內含有 items 陣列";
    }
}
    </script>
</body>
</html>
