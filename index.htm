<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Page</title>
    <style>
        body { background: #0f1117; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        #status { color: #63d297; font-size: 24px; margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status">程式載入中...</div>
    <div id="today"></div>
    <br>
    <button onclick="testFunction()">點擊測試按鈕</button>

    <script>
        // 1. Check if script runs at all
        document.getElementById('status').textContent = "✅ 程式已成功啟動";

        // 2. Show Date
        const now = new Date();
        document.getElementById('today').textContent = "今日日期：" + now.toLocaleDateString();

        // 3. Test Button
        function testFunction() {
            alert("按鈕運作正常！");
        }
        
        console.log("Script execution finished.");
    </script>
</body>
</html>
