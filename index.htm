<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日期待辦排序器 - 雲端版</title>
    <style>
        body { background: #0f1117; color: #e8eaed; font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .btn-sync { background: #63d297; color: #0f1117; border: none; padding: 12px 24px; rounded: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; border-radius: 8px; }
        .task-card { background: #181a22; border: 1px solid #2a2d37; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .date-label { color: #63d297; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .task-text { font-size: 14px; }
        #status { text-align: center; color: #7a7f8a; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>日期待辦排序器</h1>
        <div id="todayDisplay">載入中...</div>
    </div>

    <button class="btn-sync" onclick="syncData()">🔄 同步雲端資料</button>
    <div id="status">點擊按鈕從 GitHub 抓取資料</div>

    <hr style="border: 0; border-top: 1px solid #2a2d37; margin: 25px 0;">

    <div id="results">
        <!-- 資料會顯示在這裡 -->
    </div>

    <script>
        // 1. 顯示今日日期
        const today = new Date();
        document.getElementById('todayDisplay').textContent = "今日：" + (today.getFullYear() - 1911) + "年" + (today.getMonth() + 1) + "月" + today.getDate() + "日";

       async function syncData() {
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    
    // 🔴 THE LINK TEST
    // Please check if "todo.json" is the EXACT filename inside your Gist
    const url = 'https://gist.githubusercontent.com/kulo2026/6eb3376bcf2fe8f601ab1e59ffd42074/raw/4f3744f0987add6040fb53c4c288d3e62f2f9a5e/todo.json';

    status.innerHTML = `⌛ 正在嘗試連線至：<br><small>${url}</small>`;

    try {
        const response = await fetch(url + '?t=' + Date.now());
        
        if (response.status === 404) {
            throw new Error("找不到檔案 (404)。請確認 Gist 中的檔名是否為 todo.json");
        }
        
        if (!response.ok) throw new Error("連線失敗：" + response.status);
        
        const data = await response.json();
        
        if (data && data.items) {
            let html = '';
            data.items.sort((a, b) => a.date.localeCompare(b.date));
            data.items.forEach(item => {
                html += `<div class="task-card">
                            <div class="date-label">${item.date}</div>
                            <div class="task-text">${item.task}</div>
                         </div>`;
            });
            results.innerHTML = html;
            status.textContent = "✅ 同步成功！";
        }
    } catch (err) {
        console.error(err);
        status.style.color = "#f87171";
        status.innerHTML = "❌ 錯誤： " + err.message + 
            "<br><br>💡 提示：請開啟 <a href='https://github.com' target='_blank' style='color:#63d297;'>您的 Gist 頁面</a> 確認檔名是否為 <b>todo.json</b>";
    }
}
    </script>
</body>
</html>
