    // LocalStorage 儲存和讀取
    function saveToLocalStorage() {
  const storageData = currentData.map(item => {
    // Helper to get local YYYY-MM-DD without timezone shifts
    const d = item.date;
    const localDateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    
    return {
      date: localDateStr, // Store as string to prevent ISO shifting
      dateStr: item.dateStr,
      task: item.task,
      frequency: item.frequency || '',
      // Ensure baselineDate exists; if not, use the item's own date
      baselineDate: item.baselineDate || localDateStr,
      originalDateStr: item.originalDateStr
    };
  });

  localStorage.setItem('todoData', JSON.stringify(storageData));
  localStorage.setItem('baselineSnapshot', JSON.stringify(baselineSnapshot));
  localStorage.setItem('dateFormatSnapshot', JSON.stringify(dateFormatSnapshot));
  localStorage.setItem('originalDateFormatMap', JSON.stringify(originalDateFormatMap));
}


//loadFromLocalStorage 有改過
function loadFromLocalStorage() {
  const stored = localStorage.getItem('todoData');
  if (!stored) return [];
  
  try {
    const parsed = JSON.parse(stored);
    
    // Load snapshots
    baselineSnapshot = JSON.parse(localStorage.getItem('baselineSnapshot') || '{}');
    dateFormatSnapshot = JSON.parse(localStorage.getItem('dateFormatSnapshot') || '{}');
    originalDateFormatMap = JSON.parse(localStorage.getItem('originalDateFormatMap') || '{}');
    
    let allItems = [];

    // Process each saved item
    parsed.forEach(item => {
      // 1. Create a proper Date object from the saved string
      const [y, m, d] = item.date.split('-').map(Number);
      const dateObj = new Date(y, m - 1, d);
      dateObj.setHours(0, 0, 0, 0);

      // 2. If it has a frequency, we usually want to re-generate the series 
      // to ensure the "Nth Weekday" logic is applied correctly to the full year
      if (item.frequency && item.frequency !== "") {
        // We only generate if this is the first time we encounter this task 
        // to avoid duplicates (assuming tasks are unique)
        const exists = allItems.some(existing => existing.task === item.task);
        if (!exists) {
          const generated = generateRecurringItems(item);
          allItems.push(...generated);
        }
      } else {
        // Regular item
        allItems.push({
          ...item,
          date: dateObj
        });
      }
    });

    return allItems;
  } catch (e) {
    console.error("Failed to load data:", e);
    return [];
  }
}

    function getTodayDisplay() {
      const today = new Date();
      const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
      const rocYear = today.getFullYear() - 1911;
      const month = today.getMonth() + 1;
      const day = today.getDate();
      const weekday = weekdays[today.getDay()];
      return `今日：${rocYear}年${month}月${day}日（週${weekday}）`;
    }

    const taiwanHolidays2026 = [
      '2026-01-01', '2026-01-28', '2026-01-29', '2026-01-30', '2026-02-28',
      '2026-04-04', '2026-04-05', '2026-06-10', '2026-09-10', '2026-10-10',
      '2026-12-25'
    ];

    function getDaysDifference(targetDate) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(targetDate);
      target.setHours(0, 0, 0, 0);

      const formatDate = (d) => {
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      };

      if (target.getTime() === today.getTime()) return 0;

      let workDays = 0;
      const step = target > today ? 1 : -1;
      let current = new Date(today);

      while (current.getTime() !== target.getTime()) {
        current.setDate(current.getDate() + step);
        const dateStr = formatDate(current);
        const isHoliday = taiwanHolidays2026.includes(dateStr);
        const isWeekend = current.getDay() === 0 || current.getDay() === 6;
        
        if (!isHoliday && !isWeekend) {
          workDays += step;
        }
      }
      return workDays;
    }
    
    function formatDateString(year, month, day, isWesternYear) {
    const weekdaysTW = ['日', '一', '二', '三', '四', '五', '六'];
    const weekdaysEN = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    
    const date = new Date(year, month - 1, day);
    const dayIdx = date.getDay();
    const dayTW = weekdaysTW[dayIdx];
    const dayEN = weekdaysEN[dayIdx];
    
    if (isWesternYear) {
        // 格式：2026 年 4 月 19 日 (Sun/週日)
        return `${year} 年 ${month} 月 ${day} 日 (${dayEN}/週${dayTW})`;
    } else {
        const rocYear = year - 1911;
        // 格式：115 年 4 月 19 日 (Sun/週日)
        return `${rocYear} 年 ${month} 月 ${day} 日 (${dayEN}/週${dayTW})`;
    }
}


   //generateRecurringItems 有改過
   function generateRecurringItems(baseItem, overrideBaseline = null, isWesternYear = true) {
    const items = [];
    
    let baselineDateStr = overrideBaseline || baseItem.baselineDate;
    
    if (!baselineDateStr && baseItem.date) {
        const d = baseItem.date;
        baselineDateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    const [baseYear, baseMonth, baseDay] = baselineDateStr.split('-').map(Number);
    const baseFrequency = baseItem.frequency || '每周';

    const createSafeDate = (y, m, d) => {
        const date = new Date(y, m, d);
        date.setHours(0, 0, 0, 0);
        return date;
    };

    /**
     * Helper to find the Nth occurrence of a specific weekday in a month
     * @param {number} year - Full year
     * @param {number} month - 0-indexed month
     * @param {number} nth - 1 for first, 2 for second, etc.
     * @param {number} weekday - 0 for Sunday, 6 for Saturday
     */
    const getNthWeekdayOfMonth = (year, month, nth, weekday) => {
        // Start at the first day of the target month
        const firstDay = new Date(year, month, 1);
        // Find the first occurrence of that weekday
        let date = (weekday - firstDay.getDay() + 7) % 7;
        // Move to the Nth week
        date += (nth - 1) * 7 + 1;
        return createSafeDate(year, month, date);
    };

    // --- Frequency Logic Branching ---

    if (baseFrequency === '每周') {
        for (let week = 0; week < 52; week++) {
            const newDate = createSafeDate(baseYear, baseMonth - 1, baseDay + week * 7);
            pushItem(newDate);
        }
    } 
    else if (baseFrequency === '每月') {
        for (let m = 0; m < 12; m++) {
            const newDate = createSafeDate(baseYear, baseMonth - 1 + m, baseDay);
            pushItem(newDate);
        }
    } 
    // Logic for: 每月[第N個][週X]
    else if (baseFrequency.includes('每月第') && (baseFrequency.endsWith('週六') || baseFrequency.endsWith('週日'))) {
        const nthMap = { '第一個': 1, '第二個': 2, '第三個': 3, '第四個': 4 };
        const targetWeekday = baseFrequency.endsWith('週六') ? 6 : 0;
        
        // Extract "第一個", "第二個", etc.
        const nthString = baseFrequency.replace('每月', '').substring(0, 3);
        const nthValue = nthMap[nthString] || 1;

        for (let m = 0; m < 12; m++) {
            const newDate = getNthWeekdayOfMonth(baseYear, (baseMonth - 1) + m, nthValue, targetWeekday);
            pushItem(newDate);
        }
    }
    else if (baseFrequency === '每季') {
        for (let q = 0; q < 4; q++) {
            const newDate = createSafeDate(baseYear, baseMonth - 1 + q * 3, baseDay);
            pushItem(newDate);
        }
    } 
    else if (baseFrequency === '每年') {
        for (let y = 0; y < 10; y++) {
            const newDate = createSafeDate(baseYear + y, baseMonth - 1, baseDay);
            pushItem(newDate);
        }
    }

    function pushItem(newDate) {
        const y = newDate.getFullYear();
        const m = newDate.getMonth() + 1;
        const d = newDate.getDate();
        const dateStr = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

        items.push({
            date: newDate,
            dateStr: dateStr,
            task: baseItem.task,
            frequency: baseFrequency,
            baselineDate: baselineDateStr,
            originalDateStr: baseItem.originalDateStr
        });
    }

    return items;
}

    function startsWithDate(line) {
      line = line.trim();
      const patterns = [
        /^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})(?:\(|\s|$)/,
        /^(\d{3})[\/\-.](\d{1,2})[\/\-.](\d{1,2})(?:\(|\s|$)/,
        /^(\d{3})(\d{2})(\d{2})(?:\(|\s|$)/,
        /^(\d{6})(?:\s|$)/,  // 民國年緊密格式 YYMMDD
        /^(\d{1,2})[\/\-.](\d{1,2})(?:\s+|$)/,
        /^(\d{3})年(\d{1,2})月(\d{1,2})日(?:\s+|$)/,
      ];
      return patterns.some(p => p.test(line));
    }

//extractRecurringPattern有改過
   function extractRecurringPattern(line) {
  // Updated to include your new Nth Weekday choices
  const validFrequencies = [
    '每周', '每月', '每季', '每年',
    '每月第一個週六', '每月第一個週日', '每月第二個週六', '每月第二個週日',
    '每月第三個週六', '每月第三個週日', '每月第四個週六', '每月第四個週日'
  ];
  
  // Updated Regex: Changed ([^)]+) to catch the full Chinese string
  // 1. Western YYYY/MM/DD(Freq)
  const westernMatch = line.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})\(([^)]+)\)\s*(.*)$/);
  if (westernMatch) {
    const frequency = westernMatch[4].trim();
    if (!validFrequencies.includes(frequency)) return null;
    return { year: +westernMatch[1], month: +westernMatch[2], day: +westernMatch[3], frequency, task: westernMatch[5].trim() };
  }
  
  // 2. ROC YYYMMDD(Freq)
  const rocMatch = line.match(/^(\d{3})(\d{2})(\d{2})\(([^)]+)\)\s*(.*)$/);
  if (rocMatch) {
    const frequency = rocMatch[4].trim();
    if (!validFrequencies.includes(frequency)) return null;
    return { year: +rocMatch[1] + 1911, month: +rocMatch[2], day: +rocMatch[3], frequency, task: rocMatch[5].trim() };
  }
  
  return null;
}

//extractDateAndTask 有改過2次
function extractDateAndTask(line) {
    line = line.trim();
    if (!line) return null;

    let year, month, day, task, frequency = null, isWestern = true;

    // 1. Check for recurring patterns first
    const recur = extractRecurringPattern(line);
    if (recur) {
        ({ year, month, day, task, frequency } = recur);
        isWestern = year >= 1900;
    } else {
        const patterns = [
            /^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})(?:\s+(.+))?$/, // 0: Western
            /^(\d{3})[\/\-.](\d{1,2})[\/\-.](\d{1,2})(?:\s+(.+))?$/, // 1: ROC Dot
            /^(\d{3})(\d{2})(\d{2})(?:\s+(.+))?$/,                   // 2: ROC Tight
            /^(\d{6})(?:\s+(.+))?$/,                                 // 3: 6-digit ROC
            /^(\d{3})年(\d{1,2})月(\d{1,2})日(?:\s+(.+))?$/,         // 4: Chinese
        ];

        let m = null;
        if (m = line.match(patterns[0])) { 
            [year, month, day, task] = [+m[1], +m[2], +m[3], m[4]]; 
        } else if (m = line.match(patterns[1])) { 
            [year, month, day, task] = [+m[1] + 1911, +m[2], +m[3], m[4]]; 
            isWestern = false; 
        } else if (m = line.match(patterns[2])) { 
            [year, month, day, task] = [+m[1] + 1911, +m[2], +m[3], m[4]]; 
            isWestern = false; 
        } else if (m = line.match(patterns[3])) {
            const rocY = +m[1].substring(0, 2) + 1911; // 6-digit handling (YYMMDD)
            year = rocY; month = +m[1].substring(2, 4); day = +m[1].substring(4, 6);
            task = m[2]; isWestern = false;
        } else if (m = line.match(patterns[4])) {
            [year, month, day, task] = [+m[1] + 1911, +m[2], +m[3], m[4]];
            isWestern = false;
        } else {
            return null; // No match found
        }
    }

    const date = new Date(year, month - 1, day);
    if (isNaN(date.getTime())) return null;

    return {
        date,
        dateStr: formatDateString(year, month, day, isWestern),
        task: (task || "未命名任務").trim(),
        frequency: frequency || "",
        originalDateStr: line.split(' ')[0], // Keep original for reference
        isWestern
    };
}
    

    function parseData() {
    const raw = document.getElementById('dataInput').value;
    if (!raw.trim()) return; // 如果輸入區是空的，就不執行

    const lines = raw.split('\n');
    
    // --- 關鍵修正 1：從既有的 currentData 開始，而不是 const items = [] ---
    // 如果想要「追加」，就保留 currentData；如果想「清空後重新排列」，則維持原樣
    let items = [...currentData]; 
    const skipped = [];
    let currentItem = null;

    lines.forEach(line => {
        const trimmed = line.trim();
        if (startsWithDate(trimmed)) {
            if (currentItem) {
                processAndPush(currentItem, items); // 封裝後的處理函式
            }
            const parsed = extractDateAndTask(trimmed);
            if (parsed) {
                currentItem = parsed;
                if (!baselineSnapshot[parsed.task]) {
                    baselineSnapshot[parsed.task] = parsed.baselineDate;
                }
            } else if (trimmed) {
                skipped.push(trimmed);
                currentItem = null;
            }
        } else if (trimmed && currentItem) {
            currentItem.task += '\n' + trimmed;
        } else if (trimmed && !currentItem) {
            skipped.push(trimmed);
        }
    });

    if (currentItem) {
        processAndPush(currentItem, items);
    }

    // --- 關鍵修正 2：去重 (防呆機制) ---
    // 根據任務內容、日期字串來過濾重複項
    const uniqueItems = [];
    const seenKeys = new Set();
    items.forEach(item => {
        const key = `${item.task}|${item.dateStr}`;
        if (!seenKeys.has(key)) {
            seenKeys.add(key);
            uniqueItems.push(item);
        }
    });

    // 重新排序
    uniqueItems.sort((a, b) => a.date - b.date);

    const config = window.elementSdk?.config || defaultConfig;
    const c = { ...defaultConfig, ...config };

    // 更新全域變數
    currentData = uniqueItems; 
    
    saveToLocalStorage();
    renderResults(currentData, c, skipped);

    // --- 關鍵修正 3：清空輸入區以便下次貼上 ---
    document.getElementById('dataInput').value = '';
}

// 輔助函式：處理循環並推入陣列
function processAndPush(item, targetArray) {
    if (item.frequency) {
        targetArray.push(...generateRecurringItems(item));
    } else {
        targetArray.push(item);
    }
}

function editItem(itemKey) {
    // 1. Find the item in our current data
    const itemIndex = currentData.findIndex(item => `${item.task.trim()}|${item.dateStr}` === itemKey);
    
    if (itemIndex === -1) return;

    const oldTask = currentData[itemIndex].task;
    
    // 2. Ask user for new content
    const newTask = prompt("請編輯任務內容：", oldTask);

    // 3. If user didn't cancel and the text is different
    if (newTask !== null && newTask.trim() !== "" && newTask !== oldTask) {
        const updatedTask = newTask.trim();

        // 4. Update the specific item
        currentData[itemIndex].task = updatedTask;

        // 5. If this is part of a recurring series, update the others too?
        // (Optional: Ask user if they want to update all linked recurring tasks)
        const updateAll = confirm("是否要同步更新所有重複生成的相同任務名稱？");
        
        if (updateAll) {
            currentData.forEach(item => {
                if (item.task.trim() === oldTask.trim()) {
                    item.task = updatedTask;
                }
            });
            
            // Also update snapshots so future generations use the new name
            if (baselineSnapshot[oldTask]) {
                baselineSnapshot[updatedTask] = baselineSnapshot[oldTask];
                delete baselineSnapshot[oldTask];
            }
        }

        // 6. Save and Refresh
        saveToLocalStorage();
        renderResults(currentData, defaultConfig);
    }
}

    function deleteItem(itemKey) {

    // 將 Key 拆解回 任務名稱 與 日期字串

// changeFrequency有改過3次
    function changeFrequency(selectElement) {
  const itemKey = selectElement.getAttribute('data-item-key');
  if (!itemKey) return;
  
  // 取得 任務名稱 和 點擊時的日期
  const [task, clickedDateStr] = itemKey.split('|');
  const newFrequency = selectElement.value;

  // 1. 取得這件事的「出生證明」（基準日）
  let baselineDateStr = baselineSnapshot[task] || clickedDateStr;

  // 2. 分離資料
  // otherTasks: 別人的任務（完全不動）
  const otherTasks = currentData.filter(d => d.task !== task);
  
  let newTaskItems = [];

  if (newFrequency === '') {
    // --- 選回「無重複」模式 ---
    // 邏輯：我們只保留「當下你點擊的那一筆」，把其他的（未來的）都砍掉
    const clickedItem = currentData.find(d => d.task === task && d.dateStr === clickedDateStr);
    
    if (clickedItem) {
        newTaskItems.push({
            ...clickedItem,
            frequency: '',
            // 既然變回無重複，我們就把 baselineDate 設為當前這一天
            baselineDate: clickedDateStr 
        });
        // 同步更新快照，防止下次計算又跳回舊的基準日
        baselineSnapshot[task] = clickedDateStr;
    }
  } else {
    // --- 設定為重複模式 ---
    // 使用你提供的基準日生成未來一年的量
    const genItems = generateRecurringItems({
      task: task,
      frequency: newFrequency,
      baselineDate: baselineDateStr,
      originalDateStr: (currentData.find(d => d.task === task)?.originalDateStr) || ""
    }, baselineDateStr, true);
    
    newTaskItems = genItems;
  }

  // 3. 合併並重新排序
  currentData = [...otherTasks, ...newTaskItems];
  currentData.sort((a, b) => a.date.getTime() - b.date.getTime());

  // 4. 存檔與刷新
  saveToLocalStorage();
  const config = window.elementSdk?.config || defaultConfig;
  renderResults(currentData, { ...defaultConfig, ...config });
  
  // 5. 提示使用者
  console.log(`任務「${task}」已更新為：${newFrequency || '無重複'}`);
}

    const importFile = document.getElementById('importFile');
    if (!importFile) return;
    
    importFile.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const text = event.target.result;
                const imported = JSON.parse(text);
                
                if (!Array.isArray(imported)) {
                    throw new Error('格式錯誤：JSON 必須是一個陣列');
                }

                const parsedData = imported.map((item, index) => {
                    // 1. 處理任務內容：移除開頭末尾的換行與空白
                    let taskContent = (item.task || "").trim();
                    
                    // 2. 核心修正：從 dateStr 抓取正確日期 (避免 date 欄位的時差錯誤)
                    // 你的格式是 "2026 年 4 月 8 日"，我們用正則抓取數字
                    let foundDate = "";
                    const dateStrMatch = String(item.dateStr || "").match(/(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/);
                    
                    if (dateStrMatch) {
                        foundDate = `${dateStrMatch[1]}-${dateStrMatch[2].padStart(2, '0')}-${dateStrMatch[3].padStart(2, '0')}`;
                    } else {
                        // 如果 dateStr 沒抓到，退而求其次抓 date 欄位 (並修正可能存在的 2026-04-07 錯誤)
                        const simpleMatch = String(item.date || "").match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
                        if (simpleMatch) {
                            foundDate = `${simpleMatch[1]}-${simpleMatch[2].padStart(2, '0')}-${simpleMatch[3].padStart(2, '0')}`;
                        }
                    }

                    if (!taskContent || !foundDate) {
                        console.warn(`第 ${index} 筆解析跳過：`, item);
                        return null; 
                    }

                    const [y, m, d] = foundDate.split('-').map(Number);
                    
                    return {
                        date: new Date(y, m - 1, d, 0, 0, 0, 0),
                        dateStr: foundDate,
                        task: taskContent,
                        frequency: item.frequency || '',
                        baselineDate: item.baselineDate || foundDate,
                        originalDateStr: item.dateStr || foundDate
                    };
                }).filter(Boolean);

                if (parsedData.length === 0) {
                    throw new Error('找不到有效任務，請檢查資料格式。');
                }

                // 去重複合併
                const mergedData = [...currentData];
                const existingKeys = new Set(mergedData.map(d => `${d.dateStr}|${d.task}`));
                
                let addedCount = 0;
                parsedData.forEach(newItem => {
                    const key = `${newItem.dateStr}|${newItem.task}`;
                    if (!existingKeys.has(key)) {
                        mergedData.push(newItem);
                        existingKeys.add(key);
                        addedCount++;
                    }
                });

                mergedData.sort((a, b) => a.date.getTime() - b.date.getTime());
                currentData = mergedData;
                
                saveToLocalStorage();
                renderResults(currentData, { ...defaultConfig, ...(window.elementSdk?.config || {}) });
                
                alert(`✓ 匯入成功！\n校正後讀取：${parsedData.length} 筆\n新加入：${addedCount} 筆`);

            } catch (err) {
                alert(`✗ ${err.message}`);
            } finally {
                importFile.value = '';
            }
        };
        reader.readAsText(file);
    });
