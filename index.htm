<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日期待辦排序器</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #0f1117; color: #e8eaed; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .timeline-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .timeline-line { width: 2px; flex-shrink: 0; }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold mb-2">日期待辦排序器</h1>
            <div id="todayDisplay" class="inline-block px-4 py-1 rounded-lg text-sm font-medium" style="background:#1e2029; color:#63d297; border:1px solid #2a2d37;">今日：載入中...</div>
        </div>

        <!-- Controls -->
        <div class="rounded-xl p-4 mb-6" style="background: #181a22; border: 1px solid #2a2d37;">
            <textarea id="dataInput" rows="3" class="w-full rounded-lg px-4 py-3 text-sm bg-[#0f1117] border border-[#2a2d37] mb-3" placeholder="貼上資料 (例如: 1150423 聚餐)"></textarea>
                   
                    
        </div>
<div class="flex flex-wrap gap-2 justify-between">
    <button onclick="parseData()" class="bg-[#63d297] text-[#0f1117] px-4 py-1.5 rounded-lg font-bold text-xs">排序顯示</button>
    
    <div class="flex gap-2">
        <!-- Renamed Button -->
        <button id="cloudSyncBtn" onclick="importFromCloud()" class="bg-[#1e293b] text-[#63d297] border border-[#334155] px-3 py-1.5 rounded-lg text-xs font-medium">☁️ 雲端下載</button>
        
        <!-- New Button 1 -->
        <button onclick="manualSaveLocal()" class="bg-blue-900/20 text-blue-400 border border-blue-900/50 px-3 py-1.5 rounded-lg text-xs font-medium">💾 儲存本地</button>
        
        <!-- New Button 2 -->
        <button onclick="downloadJSON()" class="bg-purple-900/20 text-purple-400 border border-purple-900/50 px-3 py-1.5 rounded-lg text-xs font-medium">📥 本地下載</button>
        
        <button onclick="clearStorage()" class="bg-red-900/20 text-red-400 border border-red-900/50 px-3 py-1.5 rounded-lg text-xs font-medium">清除全部</button>
    </div>
</div>
        <!-- Results -->
        <div id="results" class="space-y-1"></div>
        <div id="emptyState" class="text-center py-16 text-slate-600">
            <i data-lucide="list-todo" class="w-12 h-12 mx-auto mb-3 opacity-20"></i>
            <p class="text-sm">目前沒有事項，請貼上資料或點擊同步</p>
        </div>
    </div>

    <script>
        let currentData = [];
        const taiwanHolidays2026 = ['2026-01-01', '2026-01-28', '2026-01-29', '2026-01-30', '2026-02-28', '2026-04-04', '2026-04-05', '2026-06-10', '2026-09-10', '2026-10-10', '2026-12-25'];

        window.onload = () => {
            updateToday();
            loadLocal();
            if (window.lucide) lucide.createIcons();
        };

        function updateToday() {
            const now = new Date();
            document.getElementById('todayDisplay').textContent = "今日：" + formatDate(now.getFullYear(), now.getMonth()+1, now.getDate());
        }

        // --- 核心同步邏輯 (The working Proxy Version) ---
        async function importFromCloud() {
    const btn = document.getElementById('cloudSyncBtn');
    const gistUrl = 'https://githubusercontent.com';
    
    btn.textContent = "⌛ 下載中...";
    try {
        const response = await fetch(gistUrl + '?t=' + Date.now());
        const data = await response.json();
        
        if (data.items) {
            currentData = data.items.map(i => ({...i, date: new Date(i.date)}));
            saveLocal(); // Automatically update browser memory too
            render();
            alert("✅ 雲端資料下載成功！");
        }
    } catch (e) { 
        alert("❌ 下載失敗，請檢查網路。"); 
    } finally { 
        btn.textContent = "☁️ 雲端下載"; 
    }
}

// --- 2. 儲存本地 (Saves only to Browser Memory) ---
function manualSaveLocal() {
    try {
        saveLocal(); // Calls your existing internal save logic
        alert("💾 已儲存至瀏覽器暫存！(重啟瀏覽器資料仍會在)");
    } catch (e) {
        alert("❌ 儲存失敗");
    }
}

// --- 3. 本地下載 (Saves to your computer as .json) ---
function downloadJSON() {
    if (currentData.length === 0) {
        alert("目前沒有資料可以下載");
        return;
    }

    // Prepare data in the format your GitHub Gist expects
    const exportObj = {
        items: currentData.map(item => ({
            task: item.task,
            date: item.date instanceof Date ? item.date.toISOString().split('T')[0] : item.date
        }))
    };

    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj, null, 2));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    
    const now = new Date();
    const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    downloadAnchorNode.setAttribute("download", `todo_backup_${dateStr}.json`);
    
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
    
    alert("📥 已生成 JSON 檔案，請記得上傳至 GitHub 以更新雲端。");
}
        
        
        // --- 排序與解析 ---
        function parseData() {
            const input = document.getElementById('dataInput');
            const rawText = input.value.trim();
            
            if (!rawText) return;

            const lines = rawText.split('\n');
            let addedCount = 0;

            lines.forEach(line => {
                const trimmed = line.trim();
                // Match ROC (1150423) or Western (20260423)
                const m = trimmed.match(/^(\d{3,4})(\d{2})(\d{2})\s*(.*)$/);
                
                if (m) {
                    const yearPart = m[1];
                    const month = parseInt(m[2]);
                    const day = parseInt(m[3]);
                    const task = m[4] || "未命名任務";

                    // Convert to Western Year for the Date object
                    const fullYear = yearPart.length === 3 ? parseInt(yearPart) + 1911 : parseInt(yearPart);
                    
                    const newDate = new Date(fullYear, month - 1, day);
                    newDate.setHours(0, 0, 0, 0);

                    // Push to our main data array
                    currentData.push({
                        date: newDate,
                        task: task.trim()
                    });
                    addedCount++;
                }
            });

            if (addedCount > 0) {
                // 1. Save to LocalStorage immediately
                saveLocal();
                // 2. Refresh the display
                render();
                // 3. Clear the input box
                input.value = '';
                console.log(`Successfully added ${addedCount} items.`);
            } else {
                alert("格式不正確，請使用 YYYMMDD 任務內容 格式");
            }
        }

        // --- 渲染渲染 (With Urgency Colors & English Weekdays) ---
       function render() {
            const container = document.getElementById('results');
            const empty = document.getElementById('emptyState');
            
            // 1. Get today at midnight (00:00:00) to include today's tasks
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // 2. Filter the data for display ONLY (doesn't delete from currentData)
            const displayItems = currentData.filter(item => {
                const itemDate = new Date(item.date);
                return itemDate >= today;
            });

            // 3. Handle empty state for future tasks
            if (displayItems.length === 0) { 
                empty.style.display = 'block'; 
                container.innerHTML = ''; 
                return; 
            }
            empty.style.display = 'none';

            // 4. Sort future tasks by date
            displayItems.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            let html = '', lastD = '';

            displayItems.forEach((item, i) => {
                const itemDate = new Date(item.date);
                const diff = getDiff(itemDate);
                
                // Urgency Color Logic
                const color = diff <= 1 ? '#f87171' : diff <= 3 ? '#facc15' : '#63d297';
                const dateStr = formatDate(itemDate.getFullYear(), itemDate.getMonth()+1, itemDate.getDate());
                const isNew = dateStr !== lastD; 
                lastD = dateStr;

                html += `
                <div class="flex gap-4">
                    <div class="flex flex-col items-center pt-1">
                        <div class="timeline-dot" style="background:${isNew ? color : 'transparent'}; border:2px solid ${color};"></div>
                        ${i < displayItems.length - 1 ? `<div class="timeline-line flex-1 mt-1" style="background:${color}22;"></div>` : ''}
                    </div>
                    <div class="pb-5 flex-1">
                        <div class="flex justify-between items-center mb-1">
                            ${isNew ? `<span class="text-xs font-bold" style="color:${color}">${dateStr}</span>` : '<div></div>'}
                            <button onclick="deleteSpecificItem('${item.task}', '${item.date}')" class="text-slate-600 hover:text-red-400">
                                <i data-lucide="trash-2" class="w-3 h-3"></i>
                            </button>
                        </div>
                        <div class="bg-[#181a22] border border-[#2a2d37] p-3 rounded-lg text-sm" style="border-left: 3px solid ${color}">
                            ${item.task}
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            if (window.lucide) lucide.createIcons();
        }

        // Updated Delete helper to find the right item in the main list
        function deleteSpecificItem(task, dateStr) {
            if(!confirm('確定刪除？')) return;
            currentData = currentData.filter(i => !(i.task === task && String(i.date) === dateStr));
            saveLocal();
            render();
        }

        // --- 輔助工具 ---
        function formatDate(y, m, d) {
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const date = new Date(y, m-1, d);
            return `${y-1911}年${m}月${d}日 (${days[date.getDay()]})`;
        }

        function getDiff(target) {
            const today = new Date(); today.setHours(0,0,0,0);
            return Math.ceil((target - today) / 86400000);
        }

        function saveLocal() { localStorage.setItem('todoData', JSON.stringify(currentData)); }
        function loadLocal() {
            const s = localStorage.getItem('todoData');
            if (s) { currentData = JSON.parse(s).map(i => ({...i, date: new Date(i.date)})); render(); }
        }
        function deleteItem(idx) { currentData.splice(idx, 1); saveLocal(); render(); }
        function clearStorage() { if(confirm('確定清除？')) { localStorage.clear(); currentData = []; render(); } }
    </script>
</body>
</html>
