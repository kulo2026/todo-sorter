<!doctype html>
<html lang="zh-Hant">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日期待辦排序器</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #0f1117; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .timeline-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .timeline-line { width: 2px; flex-shrink: 0; }
    textarea:focus { outline: none; }
    #app { height: 100%; width: 100%; overflow-y: auto; background: #0f1117; }
    .container-wrapper { max-width: 48rem; margin: 0 auto; padding: 2.5rem 1rem; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: #0f1117;">
   <div class="max-w-3xl mx-auto px-4 py-10 sm:py-16"><!-- Header -->
    <div class="mb-8 text-center">
     <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full mb-4" style="background: rgba(99,210,151,0.1); border: 1px solid rgba(99,210,151,0.2);"><i data-lucide="calendar-check" style="width:16px;height:16px;color:#63d297;"></i> <span class="text-xs font-medium" style="color:#63d297;">自動排序</span>
     </div>
     <h1 id="mainTitle" class="text-3xl sm:text-4xl font-bold tracking-tight" style="color:#e8eaed;">日期待辦排序器</h1>
     <p class="mt-2 text-sm" style="color:#7a7f8a;">支援西元年、民國年，自動依日期排序顯示</p>
     <div id="todayDisplay" class="mt-4 inline-block px-4 py-2 rounded-lg text-sm font-medium" style="background:#1e2029; color:#63d297; border:1px solid #2a2d37;">
      今日：115年4月17日（週五）
     </div>
    </div><!-- Input Area -->
    <div class="rounded-xl p-[1px] mb-6" style="background: linear-gradient(135deg, rgba(99,210,151,0.3), rgba(99,210,151,0.05));">
     <div class="rounded-xl p-4" style="background: #181a22;"><label class="block text-xs font-medium mb-2" style="color:#7a7f8a;"> <i data-lucide="clipboard-paste" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i> 貼上資料 </label> <textarea id="dataInput" rows="6" class="w-full rounded-lg px-4 py-3 text-sm resize-y mono" style="background:#0f1117; color:#c9ccd2; border:1px solid #2a2d37;" placeholder="範例格式：
1150110(每季) 分級檢核  日期緊連(每季)表示會自動按季重複     
1150720 團隊聚餐
1150408 
第七次燃煤供用會議"></textarea>
      <div class="flex items-center justify-between mt-3 gap-2 flex-wrap">
       <p class="text-xs" style="color:#50545e;">支援格式：民國YYYMMDD格式</p>
       <div class="flex gap-2 items-center flex-wrap"><button id="clearBtn" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" style="background:#1e2029; color:#7a7f8a; border:1px solid #2a2d37;" onclick="clearAll()">清除</button> <button id="parseBtn" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all" style="background:#63d297; color:#0f1117;" onclick="parseData()">排序顯示</button>
       </div>
      </div><!-- Storage Management Buttons -->
      <div class="flex gap-2 items-center flex-wrap mt-4 pt-4 border-t" style="border-color:#2a2d37;">
       <p class="text-xs" style="color:#7a7f8a;"><i data-lucide="database" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>本地儲存</p>
       <div class="flex gap-2 items-center flex-wrap ml-auto"><button id="downloadBtn" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" style="background:#2a2d37; color:#7a7f8a; border:1px solid #3a3d47;" onclick="downloadData()" title="儲存當前資料為 JSON 檔案"> <i data-lucide="save" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>儲存 </button> <button id="importBtn" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" style="background:#2a2d37; color:#7a7f8a; border:1px solid #3a3d47;" onclick="importData()" title="匯入之前下載的 JSON 檔案"> <i data-lucide="file-down" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>匯入 </button> <button id="clearStorageBtn" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" style="background:#2a1a1a; color:#f87171; border:1px solid #7f1d1d;" onclick="clearStorage()" title="清除所有儲存的資料"> <i data-lucide="trash-2" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>清除儲存 </button><button id="cloudUploadBtn" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" 
  style="background:#2a2d37; color:#63d297; border:1px solid #3a3d47;" 
  onclick="openUploadPage()" title="下載並開啟雲端上傳頁面"> 
  <i data-lucide="upload-cloud" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>上傳雲端 
</button>

<button id="cloudSyncBtn" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors" 
        style="background:#1e293b; color:#63d297; border:1px solid #334155;" 
        onclick="importFromCloud()">
    <i data-lucide="refresh-cw" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;margin-right:4px;"></i>同步雲端
</button>
       </div>
      </div><input type="file" id="importFile" accept=".json" style="display:none;">
     </div>
    </div><!-- Results -->
    <div id="results" class="space-y-1"></div><!-- Empty State -->
    <div id="emptyState" class="text-center py-16" style="color:#3a3d47;"><i data-lucide="list-todo" style="width:48px;height:48px;margin:0 auto 12px;display:block;"></i>
     <p class="text-sm">貼上資料後按下「排序顯示」</p>
    </div>
   </div>
  </div>
  <script>
    const defaultConfig = {
      page_title: '日期待辦排序器',
      background_color: '#0f1117',
      surface_color: '#181a22',
      text_color: '#e8eaed',
      accent_color: '#63d297'
    };

    let currentData = [];

    // 1. App Startup
    window.onload = () => {
        // Set Today's Date
        const today = new Date();
        const y = today.getFullYear();
        const m = today.getMonth() + 1;
        const d = today.getDate();
        document.getElementById('todayDisplay').textContent = `今日：${y-1911}年${m}月${d}日`;

        // Load Data
        const stored = localStorage.getItem('todoData');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                currentData = parsed.map(item => ({
                    ...item,
                    date: new Date(item.date)
                }));
                renderResults(currentData);
            } catch (e) {
                console.error("Load failed", e);
                document.getElementById('emptyState').style.display = 'block';
            }
        } else {
            document.getElementById('emptyState').style.display = 'block';
        }
        if (window.lucide) lucide.createIcons();
    };

    // 2. Cloud Sync (Your primary request)
    async function importFromCloud() {
        const btn = document.getElementById('cloudSyncBtn');
        btn.innerHTML = '🔄 同步中...';
        
        // Permanent Raw Link
        const gistUrl = 'https://gist.githubusercontent.com/kulo2026/6eb3376bcf2fe8f601ab1e59ffd42074/raw/4f3744f0987add6040fb53c4c288d3e62f2f9a5e/todo.json';
        const proxy = 'https://allorigins.win' + encodeURIComponent(gistUrl + '?t=' + Date.now());

        try {
            const response = await fetch(proxy);
            const data = await response.json();
            
            if (data.items) {
                currentData = data.items.map(item => ({
                    ...item,
                    date: new Date(item.date)
                }));
                
                // Save to browser memory
                localStorage.setItem('todoData', JSON.stringify(data.items));
                renderResults(currentData);
                alert('✅ 雲端同步完成！');
            }
        } catch (err) {
            alert('❌ 同步失敗，請檢查網路。');
        } finally {
            btn.innerHTML = '<i data-lucide="refresh-cw"></i>同步雲端';
            if (window.lucide) lucide.createIcons();
        }
    }

    // 3. Render Logic
    function renderResults(items) {
        const container = document.getElementById('results');
        const empty = document.getElementById('emptyState');
        
        if (!items || items.length === 0) {
            empty.style.display = 'block';
            container.innerHTML = '';
            return;
        }
        
        empty.style.display = 'none';
        items.sort((a, b) => a.date - b.date);

        let html = '';
        items.forEach(item => {
            const d = item.date;
            const dateStr = `${d.getFullYear()-1911}/${d.getMonth()+1}/${d.getDate()}`;
            
            html += `
            <div class="mb-2 p-4 rounded-lg" style="background:#181a22; border:1px solid #2a2d37;">
                <p class="text-xs font-bold mb-1" style="color:#63d297;">${dateStr}</p>
                <p class="text-sm text-slate-200">${item.task}</p>
            </div>`;
        });
        container.innerHTML = html;
    }

    // 4. Basic Actions
    function clearStorage() {
        if(confirm('確定清除全部資料？')) {
            localStorage.clear();
            location.reload();
        }
    }

    function downloadData() {
        const blob = new Blob([localStorage.getItem('todoData')], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'backup.json';
        a.click();
    }

    // Functions that are currently disabled in this simple version but keep the buttons from crashing
    function parseData() { alert("此版本已簡化，請使用『同步雲端』載入 Gist 資料。"); }
    function importData() { alert("此版本暫不支援本地檔案匯入。"); }
    function openUploadPage() { window.open("https://github.com", '_blank'); }
  </script>
